server {
    listen          80;
    server_name     _;
    absolute_redirect off;

    access_log  /var/log/nginx/edgenext-website-static.access.log  main;
    error_log  /var/log/nginx/edgenext-website-static.error.log  error;

    location /blogphoto/ {
        root        /usr/share/nginx/html;
        access_log  off;
        log_not_found off;
        try_files   $uri =404;
    }

    # Phase-1: legacy underscore/case URLs -> kebab-case (must precede location /)
    location = /global_cdn { return 301 /global-cdn$is_args$args; }
    location = /global_cdn/ { return 301 /global-cdn$is_args$args; }
    location = /china_cdn { return 301 /china-cdn$is_args$args; }
    location = /china_cdn/ { return 301 /china-cdn$is_args$args; }
    location = /southeast_asia_cdn { return 301 /southeast-asia-cdn$is_args$args; }
    location = /southeast_asia_cdn/ { return 301 /southeast-asia-cdn$is_args$args; }
    location = /live_streaming { return 301 /live-streaming$is_args$args; }
    location = /live_streaming/ { return 301 /live-streaming$is_args$args; }
    location = /security_cdn { return 301 /security-cdn$is_args$args; }
    location = /security_cdn/ { return 301 /security-cdn$is_args$args; }
    location = /anti_ddos { return 301 /anti-ddos$is_args$args; }
    location = /anti_ddos/ { return 301 /anti-ddos$is_args$args; }
    location = /dns_security_service { return 301 /dns-security-service$is_args$args; }
    location = /dns_security_service/ { return 301 /dns-security-service$is_args$args; }
    location = /bare_metal_server { return 301 /bare-metal-server$is_args$args; }
    location = /bare_metal_server/ { return 301 /bare-metal-server$is_args$args; }
    location = /IP_Transit { return 301 /ip-transit$is_args$args; }
    location = /IP_Transit/ { return 301 /ip-transit$is_args$args; }
    location = /ip_transit { return 301 /ip-transit$is_args$args; }
    location = /ip_transit/ { return 301 /ip-transit$is_args$args; }
    location = /mea_cdn { return 301 /mea-cdn$is_args$args; }
    location = /mea_cdn/ { return 301 /mea-cdn$is_args$args; }
    location = /e_commerce { return 301 /e-commerce$is_args$args; }
    location = /e_commerce/ { return 301 /e-commerce$is_args$args; }
    location = /sports_broadcasting { return 301 /sports-broadcasting$is_args$args; }
    location = /sports_broadcasting/ { return 301 /sports-broadcasting$is_args$args; }
    location = /e_learning { return 301 /e-learning$is_args$args; }
    location = /e_learning/ { return 301 /e-learning$is_args$args; }
    location = /case_study { return 301 /case-study$is_args$args; }
    location = /case_study/ { return 301 /case-study$is_args$args; }
    location = /contact_us { return 301 /contact-us$is_args$args; }
    location = /contact_us/ { return 301 /contact-us$is_args$args; }
    location = /thank_you { return 301 /thank-you$is_args$args; }
    location = /thank_you/ { return 301 /thank-you$is_args$args; }
    location = /media_and_entertainment { return 301 /solutions/media-entertainment$is_args$args; }
    location = /media_and_entertainment/ { return 301 /solutions/media-entertainment$is_args$args; }

    location / {
        root        /usr/share/nginx/html;
        index       index.html index.htm;
        try_files   $uri $uri.html $uri/ /index.html;
    }
}
